<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Game Peta</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0b0b0f 75%);
            color: #f1f5f9;
            overflow: hidden;
            position: relative;
        }

        /* Decorative ambient glow blobs */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            top: 20%;
            left: 20%;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(244, 63, 94, 0.12);
            border-radius: 50%;
            filter: blur(80px);
            bottom: 20%;
            right: 20%;
            z-index: 0;
        }

        .container {
            background: rgba(18, 18, 24, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 45px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        h2 { 
            margin-top: 0; 
            margin-bottom: 25px; 
            font-weight: 800; 
            font-size: 1.8rem;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 40%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(15, 15, 20, 0.6);
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }
        input::placeholder {
            color: #475569;
        }
        input:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }
        input:focus {
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.25);
            background: rgba(15, 15, 20, 0.8);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }
        button:hover {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.55);
        }
        button:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .footer a { 
            color: #818cf8; 
            text-decoration: none; 
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login Panglima</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password">
            </div>
            <button type="submit">Masuk Ke Medan Perang</button>
        </form>
        <div class="footer">
            Belum punya kerajaan? <a href="register.html">Daftar sekarang</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            fetch('/api/game/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    // Simpan sesi
                    localStorage.setItem('player', JSON.stringify(res.data));
                    window.location.href = '/map';
                } else {
                    alert(res.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Terjadi kesalahan sistem');
            });
        });
    </script>
</body>
</html>
