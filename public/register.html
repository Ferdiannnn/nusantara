<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Pemain - Game Peta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            background: rgba(30, 30, 30, 0.9);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 { margin-top: 0; margin-bottom: 20px; font-weight: 600; }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #a0a0a0;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #a0a0a0;
        }
        .footer a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pendaftaran Panglima Baru</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password">
            </div>
            <div class="form-group">
                <label for="kingdom">Pilih Kerajaan Anda</label>
                <select id="kingdom" required>
                    <option value="">-- Sedang memuat kerajaan... --</option>
                </select>
            </div>
            <button type="submit">Daftar & Bermain</button>
        </form>
        <div class="footer">
            Sudah punya akun? <a href="login.html">Login di sini</a>
        </div>
    </div>

    <script>
        // Load kingdoms
        fetch('/api/game/kingdoms')
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    const select = document.getElementById('kingdom');
                    select.innerHTML = '<option value="">-- Pilih Kerajaan --</option>';
                    res.data.forEach(k => {
                        const opt = document.createElement('option');
                        opt.value = k.id;
                        opt.textContent = k.name;
                        select.appendChild(opt);
                    });
                }
            });

        // Handle register
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const kingdom_id = document.getElementById('kingdom').value;

            fetch('/api/game/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, kingdom_id })
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    alert('Registrasi berhasil! Selamat datang, Panglima.');
                    // Simpan sesi ke localstorage
                    localStorage.setItem('player', JSON.stringify(res.data));
                    window.location.href = '/map';
                } else {
                    alert(res.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Terjadi kesalahan sistem');
            });
        });
    </script>
</body>
</html>
